<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.8.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.8.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<head>
    <title>Intramurals - Team Checker</title>
    <style>
        body {
            margin: 0;
            font-family: "Gill Sans", sans-serif;
            background-color: #0a192f;
            color: #ffd60a;
            text-shadow: 1px 1px 3px #000000;
        }

        header {
            background-color: #112240;
            padding: 15px;
            text-align: right;
        }

        header a {
            color: #ffd60a;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
        }

        .card {
            background-color: #112240;
            padding: 40px;
            border-radius: 10px;
            /* make card more spacious */
            width: 500px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .card img {
            width: 80px;   /* smaller controlled size */
            height: auto;
            margin-bottom: 15px;
        }

        /* only style text/select inputs, not radios */
        select,
        input:not([type="radio"]) {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }
        .form-check {
            display: flex;
            align-items: center;
          
            margin-top: 0.25rem;
            margin-right: 1rem;
        }
        .form-check-input {
            margin-right: 0.25rem !important;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #ffd60a;
            color: #0a192f;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Gill Sans', 'Gill Sans MT','Trebuchet MS', sans-serif;
        }

        button:hover {
            background-color: #ffc300;
        }

        .form-check-label {
            color: #ffd60a;
            font-family: 'Gill Sans', 'Gill Sans MT','Trebuchet MS', sans-serif;
            font-weight: bold;
        }
        input[type="radio"] {
            accent-color: #ffd60a;
        }
        .form-label {
            color: #ffd60a;
            font-weight: bold;
            font-family: 'Gill Sans', 'Gill Sans MT', 'Trebuchet MS', sans-serif;
        }
        .form-select {
            background-color: #0a192f;
            color: #ffd60a;
            border: 1px solid #ffd60a;
            font-family: 'Gill Sans', 'Gill Sans MT', 'Trebuchet MS', sans-serif;
        }

    </style>
</head>
<body>

<header>
    <a href="index.html">Sign Up</a>
    <a href="team.html">Team Checker</a>
    <a href="players.html">Players</a>
</header>

<div class="container">
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" alt="Team Icon">

         
            <div class="mb-3">
                <label class="form-label">Have you registered online?</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="registered" id="registered-yes" value="yes">
                    <label class="form-check-label" for="registered-yes">Yes</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="registered" id="registered-no" value="no">
                    <label class="form-check-label" for="registered-no">No</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Do you have medical clearance?</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="medical" id="medical-yes" value="yes">
                    <label class="form-check-label" for="medical-yes">Yes</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="medical" id="medical-no" value="no">
                    <label class="form-check-label" for="medical-no">No</label>
                </div>
            </div>

            <div class="mb-3">
                <label for="grade" class="form-label">Grade level (7-10)</label>
                <select class="form-select" id="grade">
                    <option value="">Select Grade</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="section" class="form-label">Section</label>
                <select class="form-select" id="section">
                    <option value="">Select Section</option>
                    <option value="Emerald">Emerald</option>
                    <option value="Ruby">Ruby</option>
                    <option value="Sapphire">Sapphire</option>
                    <option value="Topaz">Topaz</option>
                    <option value="Jade">Jade</option>
                </select>
            </div>
            
            <button id="check-btn" py-click="check">Sign Up</button>
            <div id="result" class="mt-4"></div>
        </div>
    </div>
    </div>
</div>
<script type="py" src="main3.py" ></script>
</body>
</html>
