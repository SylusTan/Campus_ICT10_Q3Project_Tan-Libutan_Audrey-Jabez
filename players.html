<!DOCTYPE html>
<html>
        <link rel="stylesheet" href="https://pyscript.net/releases/2024.8.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.8.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<head>
    <title>Intramurals - Players</title>
    <style>
        body {
            margin: 0;
            font-family: "Gill Sans";
            background-color: #0a192f;
            color: #ffffff;
            text-shadow: 1px 1px 3px #000000;
        }

        header {
            background-color: #112240;
            padding: 15px;
            text-align: right;
        }

        header a {
            color: #ffd60a;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        header a:hover {
            color: #ffffff;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .card {
            background-color: #112240;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .card img {
            width: 80px;
            height: auto;
            margin-bottom: 15px;
            filter: brightness(0) invert(1); 
        }

        ul {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        li {
            padding: 5px 0;
            margin-bottom: 8px; 
            border-bottom: 1px solid #ffd60a;
        }

        li:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        ul::-webkit-scrollbar {
            width: 6px;
        }

        ul::-webkit-scrollbar-thumb {
            background: #ffd60a;
            border-radius: 10px;
        }
        h2{
            color: #ffd60a;
            text-shadow: 1px 1px 3px #000000;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
         li{
            color: #ffd60a;
            text-shadow: 1px 1px 3px #000000;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        a{
            color: #ffd60a;
            text-shadow: 1px 1px 3px #000000;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html">Sign Up</a>
    <a href="team.html">Team Checker</a>
    <a href="players.html">Players</a>
</header>

    <div class="card">
        <img src="https://png.pngtree.com/png-vector/20230817/ourmid/pngtree-volleyball-vector-clip-art-png-image_9183126.png" alt="Volleyball Icon">

        <h2>Intramurals Players</h2>


        <ul id="players-list">
        </ul>

    </div>
</div>

</html>
